name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF_NAME}
          GOOS=linux   GOARCH=amd64 go build -ldflags="-s -w -X main.version=${VERSION}" -o cix-linux-amd64   ./cmd/cix
          GOOS=darwin  GOARCH=amd64 go build -ldflags="-s -w -X main.version=${VERSION}" -o cix-darwin-amd64  ./cmd/cix
          GOOS=darwin  GOARCH=arm64 go build -ldflags="-s -w -X main.version=${VERSION}" -o cix-darwin-arm64  ./cmd/cix
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w -X main.version=${VERSION}" -o cix-windows-amd64.exe ./cmd/cix

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cix-linux-amd64
            cix-darwin-amd64
            cix-darwin-arm64
            cix-windows-amd64.exe
          generate_release_notes: true
