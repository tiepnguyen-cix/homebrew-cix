stages:
  - build
  - test
  - deploy

variables:
  NODE_ENV: test
  APP_NAME: my-app

build:
  stage: build
  image: node:20-alpine
  before_script:
    - echo "Installing dependencies..."
    - npm ci
  script:
    - echo "Building $APP_NAME..."
    - npm run build
  artifacts:
    paths:
      - dist/

test:
  stage: test
  image: node:20-alpine
  needs:
    - build
  script:
    - npm run test
    - npm run lint

deploy:
  stage: deploy
  image: alpine:latest
  script:
    - echo "Deploying to staging..."
    - echo "Branch: $CI_COMMIT_BRANCH"
    - echo "SHA: $CI_COMMIT_SHORT_SHA"
  allow_failure: false